  const po   = state.vendors[vendor].pos[pi];
  const v    = vendor;
  const rows = po.rows||[];

  // ── Colors matching the app ──────────────────────────────────────────
  const C = {
    ivory:   [250, 250, 248],   // --ivory
    cream:   [247, 245, 240],   // --cream
    ink:     [26,  26,  24 ],   // --ink
    inkMid:  [61,  61,  59 ],   // --ink-mid
    inkLt:   [138, 138, 134],   // --ink-light
    inkXlt:  [196, 196, 191],   // --ink-xlight
    border:  [226, 224, 218],   // --border
    borderLt:[237, 235, 230],   // --border-light
    gold:    [184, 168, 130],   // --gold
    lateRed: [139, 46,  46 ],
    openBlue:[28,  58,  92 ],
    compGreen:[44, 92,  58 ],
    amber:   [107, 74,  26 ],
  };

  const doc   = new jsPDF({ orientation:'landscape', unit:'pt', format:'letter' });
  const pageW = doc.internal.pageSize.getWidth();
  const pageH = doc.internal.pageSize.getHeight();
  const ML = 44, MR = 44, MT = 36;
  const contentW = pageW - ML - MR;
  let y = MT;

  const totalUnits   = rows.reduce((s,r)=>s+(parseInt(r.units)||0),0);
  const usdCostPDF   = rows.filter(r=>r.price!=null&&(r.priceCurrency||'USD')==='USD').reduce((s,r)=>s+(parseFloat(r.price)||0)*(parseInt(r.units)||0),0);
  const eurCostPDF   = rows.filter(r=>r.price!=null&&r.priceCurrency==='EUR').reduce((s,r)=>s+(parseFloat(r.price)||0)*(parseInt(r.units)||0),0);
  const costStrPDF   = [usdCostPDF>0?'$'+usdCostPDF.toLocaleString('en-US',{minimumFractionDigits:2}):'', eurCostPDF>0?'\u20AC'+eurCostPDF.toLocaleString('en-US',{minimumFractionDigits:2}):''].filter(Boolean).join(' + ');
  const hasCostPDF   = costStrPDF.length > 0;
  const totalCostPDF = usdCostPDF + eurCostPDF; // for legacy checks
  const st = po.status==='complete'?'RECEIVED': isLate(po)?'LATE': isUpcoming(po)?'UPCOMING':'OPEN';
  const stColor = {RECEIVED:C.compGreen, LATE:C.lateRed, UPCOMING:C.amber, OPEN:C.openBlue}[st];

  // ── Full-page ivory background ───────────────────────────────────────
  doc.setFillColor(...C.ivory);
  doc.rect(0, 0, pageW, pageH, 'F');

  // ── Thin top border bar ──────────────────────────────────────────────
  doc.setFillColor(...C.ink);
  doc.rect(0, 0, pageW, 3, 'F');

  // ── AFLALO wordmark (top left) ───────────────────────────────────────
  doc.setFont('helvetica','bold');
  doc.setFontSize(9);
  doc.setTextColor(...C.inkLt);
  doc.setCharSpace(3);
  doc.text('AFLALO', ML, y + 12);
  doc.setCharSpace(0);

  // ── Page number (top right) ──────────────────────────────────────────
  doc.setFont('helvetica','normal');
  doc.setFontSize(7);
  doc.setTextColor(...C.inkLt);
  const pgLabel = 'PRODUCTION ORDER';
  doc.text(pgLabel, pageW - MR - doc.getTextWidth(pgLabel), y + 12);

  y += 28;

  // ── Thin rule ────────────────────────────────────────────────────────
  doc.setDrawColor(...C.border);
  doc.setLineWidth(0.4);
  doc.line(ML, y, pageW - MR, y);
  y += 20;

  // ── Main title: VENDOR X AFLALO ──────────────────────────────────────
  const titleText = v + ' \u00D7 AFLALO';
  doc.setFont('times','italic');   // closest to EB Garamond in built-in fonts
  doc.setFontSize(28);
  doc.setTextColor(...C.ink);
  doc.text(titleText, ML, y);
  y += 6;

  // ── Status pill inline after title ──────────────────────────────────
  const pillX = ML + doc.getTextWidth(titleText) + 12;
  const pillY = y - 18;
  doc.setFontSize(7);
  doc.setFont('helvetica','bold');
  doc.setCharSpace(1.5);
  const pillLabel = st;
  const pillW = doc.getTextWidth(pillLabel) + 12;
  doc.setFillColor(...stColor.map(c=>Math.min(255,c+170)));
  doc.setDrawColor(...stColor);
  doc.setLineWidth(0.4);
  doc.roundedRect(pillX, pillY - 8, pillW, 12, 1, 1, 'FD');
  doc.setTextColor(...stColor);
  doc.text(pillLabel, pillX + 6, pillY + 2);
  doc.setCharSpace(0);

  y += 10;

  // ── Sub-rule ─────────────────────────────────────────────────────────
  doc.setDrawColor(...C.border);
  doc.setLineWidth(0.4);
  doc.line(ML, y, pageW - MR, y);
  y += 14;

  // ── Meta block: two rows of key/value pairs ──────────────────────────
  const meta1 = [
    ['PO NUMBER', po.num||'—'],
    ['VENDOR',    v],
    ['CATEGORY',  po.category||'—'],
    ['EX-FACTORY', po.date||'—'],
    ['STYLES',    String(rows.length)],
    ['TOTAL UNITS', String(totalUnits)],
  ];
  if(hasCostPDF) meta1.push(['TOTAL COST', costStrPDF]);
  if(po.comments && po.comments.trim()) meta1.push(['NOTES', po.comments.trim()]);

  const metaCols = meta1.length;
  const metaColW = contentW / metaCols;

  meta1.forEach((pair, i) => {
    const mx = ML + i * metaColW;
    doc.setFont('helvetica','normal');
    doc.setFontSize(6.5);
    doc.setTextColor(...C.inkLt);
    doc.setCharSpace(1.2);
    doc.text(pair[0], mx, y);
    doc.setCharSpace(0);
    doc.setFont('helvetica','bold');
    doc.setFontSize(9);
    doc.setTextColor(...C.ink);
    doc.text(pair[1], mx, y + 11, {maxWidth: metaColW - 4});
  });

  y += 28;

  // ── Thin rule ────────────────────────────────────────────────────────
  doc.setDrawColor(...C.border);
  doc.setLineWidth(0.4);
  doc.line(ML, y, pageW - MR, y);
  y += 10;

  // ── TABLE ─────────────────────────────────────────────────────────────
  const hasPrice = rows.some(r=>r.price!=null);
  const allAlpha   = rows.every(r=>(r.sizeType||'numeric')==='alpha');
  const allDenim   = rows.every(r=>(r.sizeType||'numeric')==='denim');
  const allNumeric = rows.every(r=>(r.sizeType||'numeric')==='numeric');
  const hdrSzLabels = allAlpha?['XS','S','M','L','XL']: allDenim?['24','25','26','27','28','29','30']: allNumeric?['0','2','4','6','8']:['0/XS','2/S','4/M','6/L','8/XL'];

  const headCols = ['SKU','STYLE NAME','ART # / FABRIC','COLOR'];
  if(hasPrice) headCols.push('PRICE');
  headCols.push(...hdrSzLabels, 'UNITS', 'EX-FACTORY');

  const tableBody = rows.map(r=>{
    const styleExf = r.exf && r.exf.trim();
    const displayExf = styleExf && styleExf !== po.date ? styleExf + ' [S]' : (po.date||'—');
    const isDenim = (r.sizeType||'numeric')==='denim';
    const row = [r.sku||'', r.name||'', r.art||'', r.color||''];
    if(hasPrice) row.push(r.price!=null? currSym(r.priceCurrency||'USD')+Number(r.price).toFixed(2):'—');
    row.push(
      r.s0?String(r.s0):'—',
      r.s2?String(r.s2):'—',
      r.s4?String(r.s4):'—',
      r.s6?String(r.s6):'—',
      r.s8?String(r.s8):'—'
    );
    if(isDenim){
      row.push(r.s29?String(r.s29):'—', r.s30?String(r.s30):'—');
    } else if(allDenim){
      row.push('—','—');
    }
    row.push(String(r.units||0), displayExf);
    return row;
  });

  // Column widths
  const szCount  = allDenim ? 7 : 5;
  const szColPt  = allDenim ? 20 : 24;
  const exfColW  = 52;
  const unitsColW = 30;
  const priceColW = hasPrice ? 42 : 0;
  const fixedW   = priceColW + szColPt*szCount + unitsColW + exfColW;
  const flexW    = contentW - fixedW;
  // Distribute flex space: SKU 18%, Name 28%, Art 34%, Color remainder
  const skuW   = Math.floor(flexW * 0.18);
  const nameW  = Math.floor(flexW * 0.28);
  const artW   = Math.floor(flexW * 0.34);
  const colorW = flexW - skuW - nameW - artW;

  const colStyles = {};
  let ci = 0;
  colStyles[ci++] = {cellWidth: skuW,   overflow:'linebreak'};
  colStyles[ci++] = {cellWidth: nameW,  overflow:'linebreak'};
  colStyles[ci++] = {cellWidth: artW,   overflow:'linebreak'};
  colStyles[ci++] = {cellWidth: Math.max(30, colorW), overflow:'linebreak'};
  if(hasPrice) colStyles[ci++] = {cellWidth: priceColW, halign:'right'};
  for(let i=0;i<szCount;i++) colStyles[ci++] = {cellWidth:szColPt, halign:'center'};
  colStyles[ci++] = {cellWidth: unitsColW, halign:'center', fontStyle:'bold'};
  colStyles[ci++] = {cellWidth: exfColW,   overflow:'linebreak'};

  doc.autoTable({
    startY: y,
    head:   [headCols],
    body:   tableBody,
    margin: { left:ML, right:MR },
    styles: {
      font:        'helvetica',
      fontSize:    7,
      cellPadding: {top:5, right:4, bottom:5, left:4},
      overflow:    'linebreak',
      valign:      'middle',
      textColor:   C.inkMid,
      lineColor:   C.borderLt,
      lineWidth:   0.3,
      fillColor:   C.ivory,
    },
    headStyles: {
      fillColor:   C.cream,
      textColor:   C.inkLt,
      fontSize:    5.5,
      fontStyle:   'normal',
      halign:      'left',
      cellPadding: {top:4, right:4, bottom:4, left:4},
      lineColor:   C.border,
      lineWidth:   0.4,
    },
    alternateRowStyles: {
      fillColor: C.cream,
    },
    didParseCell: function(data){
      if(data.section==='body'){
        const szOffset = allDenim ? 7 : 5;
        const baseCols = 4 + (hasPrice?1:0);
        const unitsIdx = baseCols + szOffset;
        const exfIdx   = baseCols + szOffset + 1;
        if(data.column.index === unitsIdx){
          data.cell.styles.textColor = C.ink;
          data.cell.styles.fontStyle = 'bold';
          data.cell.styles.fontSize  = 8;
        }
        if(data.column.index === exfIdx && data.cell.raw && String(data.cell.raw).includes('[S]')){
          data.cell.styles.textColor = C.amber;
        }
      }
    },
    columnStyles: colStyles,
    didDrawPage: function(data){
      // Re-draw ivory background on subsequent pages
      if(data.pageNumber > 1){
        doc.setFillColor(...C.ivory);
        doc.rect(0, 0, pageW, pageH, 'F');
        doc.setFillColor(...C.ink);
        doc.rect(0, 0, pageW, 3, 'F');
      }
      // Footer every page
      doc.setDrawColor(...C.border);
      doc.setLineWidth(0.3);
      doc.line(ML, pageH-26, pageW-MR, pageH-26);
      doc.setFont('helvetica','normal');
      doc.setFontSize(6.5);
      doc.setTextColor(...C.inkLt);
      doc.setCharSpace(0.8);
      doc.text(v+' \u00D7 AFLALO', ML, pageH-14);
      const pgStr = 'PO #'+po.num+'  \u00B7  Page '+data.pageNumber;
      doc.text(pgStr, pageW-MR-doc.getTextWidth(pgStr)-4, pageH-14);
      doc.setCharSpace(0);
    }
  });

  // ── Summary bar below table ───────────────────────────────────────────
  const summaryY = doc.lastAutoTable.finalY;
  doc.setFillColor(...C.cream);
  doc.setDrawColor(...C.border);
  doc.setLineWidth(0.3);
  doc.rect(ML, summaryY, contentW, 22, 'FD');

  doc.setFont('helvetica','normal');
  doc.setFontSize(7);
  doc.setTextColor(...C.inkLt);
  doc.setCharSpace(0.8);
  let summaryParts = [
    'TOTAL STYLES: '+rows.length,
    'TOTAL UNITS: '+totalUnits,
  ];
  if(hasCostPDF) summaryParts.push('TOTAL COST: '+costStrPDF);
  summaryParts.push('STATUS: '+st);
  const summaryText = summaryParts.join('   \u00B7   ');
  doc.text(summaryText, ML+10, summaryY+14);
  doc.setCharSpace(0);

  // ── Merge attachment as extra page(s) if present ─────────────────────
  const filename = v+' X AFLALO - PO '+po.num+'.pdf';
  const poPdfBytes = doc.output('arraybuffer');

  if(po.attachmentData){
    const attType = (po.attachmentType||'').toLowerCase();
    const attName = (po.attachmentName||'').toLowerCase();
    const isPDF   = attType.includes('pdf') || attName.endsWith('.pdf');
    const isImg   = attType.includes('image') || /\.(png|jpg|jpeg|gif|webp)$/i.test(attName);

    if(isPDF && window.PDFLib){
      // Use pdf-lib to merge the two PDFs
      try{
        const { PDFDocument } = PDFLib;
        const mergedDoc = await PDFDocument.create();

        // Copy pages from PO PDF
        const poDoc = await PDFDocument.load(poPdfBytes);
        const poCopied = await mergedDoc.copyPages(poDoc, poDoc.getPageIndices());
        poCopied.forEach(p => mergedDoc.addPage(p));

        // Convert base64 attachment to ArrayBuffer
        const b64 = po.attachmentData.split(',')[1] || po.attachmentData;
        const attBytes = Uint8Array.from(atob(b64), c=>c.charCodeAt(0)).buffer;
        const attDoc = await PDFDocument.load(attBytes);
        const attCopied = await mergedDoc.copyPages(attDoc, attDoc.getPageIndices());
        attCopied.forEach(p => mergedDoc.addPage(p));

        const mergedBytes = await mergedDoc.save();
        const blob = new Blob([mergedBytes], {type:'application/pdf'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = filename;
        a.click();
        return;
      }catch(err){
        console.warn('PDF merge failed, falling back to separate download:', err);
      }
    }

    if(isImg){
      // Add a new landscape page with the image centred
      try{
        const { PDFDocument } = PDFLib;
        const mergedDoc = await PDFDocument.create();

        const poDoc = await PDFDocument.load(poPdfBytes);
        const poCopied = await mergedDoc.copyPages(poDoc, poDoc.getPageIndices());
        poCopied.forEach(p => mergedDoc.addPage(p));

        const b64 = po.attachmentData.split(',')[1] || po.attachmentData;
        const imgBytes = Uint8Array.from(atob(b64), c=>c.charCodeAt(0));
        let pdfImg;
        if(attType.includes('png') || attName.endsWith('.png')){
          pdfImg = await mergedDoc.embedPng(imgBytes);
        } else {
          pdfImg = await mergedDoc.embedJpg(imgBytes);
        }
        const { width:iw, height:ih } = pdfImg.scale(1);
        // Landscape letter in points: 792 x 612
        const pgW = 792, pgH = 612, pad = 40;
        const maxW = pgW - pad*2, maxH = pgH - pad*2;
        const scale = Math.min(maxW/iw, maxH/ih, 1);
        const dw = iw*scale, dh = ih*scale;
        const imgPage = mergedDoc.addPage([pgW, pgH]);
        imgPage.drawImage(pdfImg, { x:(pgW-dw)/2, y:(pgH-dh)/2, width:dw, height:dh });

        const mergedBytes = await mergedDoc.save();
        const blob = new Blob([mergedBytes], {type:'application/pdf'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = filename;
        a.click();
        return;
      }catch(err){
        console.warn('Image embed failed, falling back:', err);
      }
    }

    // Non-PDF/image attachment: download PO PDF normally, then trigger attachment download separately
    doc.save(filename);
    setTimeout(()=>{
      const a = document.createElement('a');
      a.href = po.attachmentData;
      a.download = po.attachmentName || 'attachment';
      a.click();
    }, 800);
    return;
  }

  // No attachment — just save normally
  doc.save(filename);
}

// ─── COMMENT HELPERS ──────────────────────────────────────────────────────────
function toggleDashComment(vendor, pi){
  // Toggle the inline editor on the PO list row
  const editor = document.getElementById('dash-cmtedit-'+vendor+'-'+pi);
  const row    = document.getElementById('dash-cmtrow-'+vendor+'-'+pi);
  if(!editor) { toggleTodoEditor(vendor, pi); return; }
  const isOpen = editor.style.display !== 'none';
  editor.style.display = isOpen ? 'none' : 'block';
  if(row) row.style.display = isOpen ? '' : 'none';
  if(!isOpen){
    const inp = document.getElementById('dash-cmtinput-'+vendor+'-'+pi);
    if(inp){ inp.value = state.vendors[vendor].pos[pi].comments||''; inp.focus(); }
  }
}
function toggleTodoEditor(vendor, pi){
  const editor = document.getElementById('dash-cmtedit2-'+vendor+'-'+pi);
  if(!editor) return;
  const isOpen = editor.style.display !== 'none';
  editor.style.display = isOpen ? 'none' : 'block';
  if(!isOpen){
    const inp = document.getElementById('dash-cmtinput2-'+vendor+'-'+pi);
    if(inp){ inp.value = state.vendors[vendor].pos[pi].comments||''; inp.focus(); }
  }
}
function saveDashComment(vendor, pi){
  const inp = document.getElementById('dash-cmtinput-'+vendor+'-'+pi);
  if(inp){ state.vendors[vendor].pos[pi].comments = inp.value.trim(); save(); }
  renderDashboard();
}
function saveDashComment2(vendor, pi){
  const inp = document.getElementById('dash-cmtinput2-'+vendor+'-'+pi);
  if(inp){ state.vendors[vendor].pos[pi].comments = inp.value.trim(); save(); }
  renderDashboard();
}
function clearDashComment(vendor, pi){
  state.vendors[vendor].pos[pi].comments = '';
  save(); renderDashboard();
}
function toggleInlineComment(vendor, pi){
  const id = 'cmt-'+vendor+'-'+pi;
  const editor = document.getElementById(id+'-editor');
  if(!editor) return;
  const isOpen = editor.style.display !== 'none';
  editor.style.display = isOpen ? 'none' : 'block';
  if(!isOpen){ const inp = document.getElementById(id+'-input'); if(inp) inp.focus(); }
}

function saveInlineComment(vendor, pi){
  const id = 'cmt-'+vendor+'-'+pi;
  const inp = document.getElementById(id+'-input');
  if(!inp) return;
  state.vendors[vendor].pos[pi].comments = inp.value.trim();
  save();
  renderPOManager();
}

function clearComment(vendor, pi){
  state.vendors[vendor].pos[pi].comments = '';
  save();
  renderPOManager();
}

// ─── MODAL HELPERS ────────────────────────────────────────────────────────────
function openModal(id){ document.getElementById(id).classList.add('open'); }
function closeModal(id){ document.getElementById(id).classList.remove('open'); }

// Close on backdrop click
document.querySelectorAll('.modal-overlay').forEach(el=>{
  el.addEventListener('click', e=>{ if(e.target===el) el.classList.remove('open'); });
});

// ─── INIT ─────────────────────────────────────────────────────────────────────
renderSidebar();
showView('dashboard');
</script>
